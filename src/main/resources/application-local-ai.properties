# V6.0 local-ai profile: call Python AI Runtime Worker (manual / demo only)
# Start worker: cd workers/ai-runtime-worker && uvicorn main:app --host 127.0.0.1 --port 8001
# Start app: .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=local-ai

app.embedding.provider=local-worker
app.embedding.local-worker.base-url=http://127.0.0.1:8001
app.embedding.local-worker.model=sentence-transformers/all-MiniLM-L6-v2
app.embedding.local-worker.dimension=384
app.embedding.local-worker.timeout-ms=30000

app.llm.provider=local-python
app.llm.base-url=http://127.0.0.1:8001
app.llm.model=mock-llm-template
app.llm.temperature=0.2
app.llm.max-tokens=1200
app.llm.timeout-ms=60000
