spring.application.name=ai-task-orchestrator

spring.datasource.url=jdbc:mysql://localhost:3306/ai_task_orchestrator_flyway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

server.port=8080

app.embedding.provider=local-worker
app.embedding.openai.base-url=https://api.openai.com/v1
app.embedding.openai.api-key=${OPENAI_API_KEY:}
app.embedding.openai.model=text-embedding-3-small
app.embedding.openai.timeout-ms=10000
app.embedding.openai.dimension=1536
app.embedding.local-worker.base-url=http://127.0.0.1:8001
app.embedding.local-worker.model=qwen3-embedding:0.6b
app.embedding.local-worker.dimension=1024
app.embedding.local-worker.timeout-ms=120000

app.vector-store.provider=exact
app.vector-store.qdrant.base-url=http://127.0.0.1:6333
app.vector-store.qdrant.collection-name=ai_task_orchestrator_chunks
app.vector-store.qdrant.api-key=
app.vector-store.qdrant.timeout-ms=3000
app.vector-store.qdrant.initialize-collection=false

app.evaluation.retrieval.enabled=false
app.evaluation.retrieval.dataset-path=docs/evaluation/rag-retrieval-eval-cases.json
app.evaluation.retrieval.report-output-dir=docs/evaluation/reports
app.evaluation.retrieval.default-top-k=5

rag.rerank.enabled=false
rag.rerank.candidate-top-k=20
rag.rerank.final-top-k=5
rag.rerank.provider=lexical

rag.hybrid.enabled=false
rag.hybrid.dense-top-k=20
rag.hybrid.lexical-top-k=20
rag.hybrid.final-top-k=5
rag.hybrid.fusion=rrf
rag.hybrid.rrf-k=60

app.chunking.strategy=STRUCTURE_AWARE_WITH_OVERLAP
app.chunking.max-chars=1200
app.chunking.min-chars=200
app.chunking.overlap-chars=120
app.chunking.preserve-code-block=true
app.chunking.preserve-table-block=true
app.chunking.include-section-path=true

app.retrieval.context-expansion=ADJACENT
app.retrieval.max-expanded-chunks=2
app.retrieval.max-context-chars=6000
app.retrieval.default-fusion=RRF
app.retrieval.reranker-mode=heuristic
app.retrieval.hybrid-enabled=false
app.retrieval.rerank-enabled=false
app.retrieval.vector-top-k=20
app.retrieval.keyword-top-k=20
app.retrieval.final-top-k=5
app.retrieval.rrf-k=60

app.evaluation.retrieval.compare-rerank=false
app.evaluation.retrieval.compare-hybrid=false
app.evaluation.retrieval.compare-hybrid-rerank=false
app.evaluation.retrieval.candidate-top-k=20
app.evaluation.retrieval.dense-top-k=20
app.evaluation.retrieval.lexical-top-k=20
app.evaluation.retrieval.hybrid-rrf-k=60
app.evaluation.retrieval.enable-query-understanding=false

app.query-understanding.enabled=true
app.query-understanding.rewrite-enabled=true
app.query-understanding.clarification-enabled=true
app.query-understanding.min-confidence=0.55
app.query-understanding.max-global-search-documents=10000
app.query-understanding.max-global-search-collections=8

app.document.ingestion.max-file-size-bytes=2097152
app.document.ingestion.max-retry-count=3
app.document.ingestion.recent-task-limit=20
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=50MB

app.batch-ingestion.enabled=true
app.batch-ingestion.max-files-per-batch=100
app.batch-ingestion.document-parse-concurrency=2
app.batch-ingestion.embedding-concurrency=1
app.batch-ingestion.max-retry-count=2
app.batch-ingestion.staging-dir=data/staging/batches

app.llm.provider=local-python
app.llm.base-url=http://127.0.0.1:8001
app.llm.model=qwen2.5:7b
app.llm.temperature=0.2
app.llm.max-tokens=1200
app.llm.timeout-ms=30000

app.agent.task.default-top-k=5
app.agent.task.recent-limit=20

app.trash.retention-days=7
app.trash.cleanup-enabled=true
app.trash.cleanup-cron=0 0 3 * * *

# V10.0 model provider: encrypt API keys with app.security.secret-key or env MODEL_PROVIDER_SECRET_KEY
# app.security.secret-key=
# app.model-provider.database-overrides-enabled=true
