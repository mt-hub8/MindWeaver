<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Answer Demo</title>
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/ask.css">
</head>
<body>
<div class="page">
    <nav id="app-nav-mount" data-active="ask"></nav>
    <script src="/app-nav.js"></script>

    <header class="hero">
        <h1>Ask Knowledge Base</h1>
        <p class="lead">兼容入口 <code>/rag-demo.html</code>。推荐使用 <a href="/ask.html">知识库问答</a>（<code>/ask.html</code>）。</p>
    </header>

    <section class="panel" aria-labelledby="query-section-title">
        <h2 id="query-section-title">提问</h2>
        <label for="query-input">您的问题</label>
        <textarea id="query-input" placeholder="例如：Embedding Cache 的 cache key 由哪些字段组成？"></textarea>

        <div class="form-row">
            <div>
                <label for="topk-input">Top K</label>
                <input id="topk-input" type="number" min="1" max="10" value="5">
            </div>
            <button id="ask-button" type="button">Ask</button>
        </div>

        <div class="suggested-questions">
            <h3>推荐问题</h3>
            <div id="suggestion-chips" class="suggestion-chips"></div>
        </div>

        <div id="loading-status" class="status loading" role="status" aria-live="polite">
            正在请求 RAG Answer，请稍候…
        </div>

        <div id="error-status" class="status error" role="alert" aria-live="assertive">
            <dl>
                <dt>错误</dt>
                <dd id="error-code"></dd>
                <dd id="error-message"></dd>
                <dd id="error-trace-id"></dd>
            </dl>
        </div>
    </section>

    <section id="answer-section" class="panel hidden" aria-labelledby="answer-section-title">
        <h2 id="answer-section-title">Answer</h2>
        <div id="answer-content" class="answer-box"></div>
    </section>

    <section id="citations-section" class="panel hidden" aria-labelledby="citations-section-title">
        <h2 id="citations-section-title">Citations</h2>
        <p id="citations-empty" class="empty-state hidden">暂无引用来源。</p>
        <ul id="citations-list" class="citation-list"></ul>
    </section>

    <section id="retrieval-section" class="panel hidden metadata" aria-labelledby="retrieval-section-title">
        <h2 id="retrieval-section-title">Retrieval Metadata</h2>
        <pre id="retrieval-metadata"></pre>
    </section>

    <section id="generation-section" class="panel hidden metadata" aria-labelledby="generation-section-title">
        <h2 id="generation-section-title">Generation Metadata</h2>
        <pre id="generation-metadata"></pre>
    </section>
</div>

<script src="/ask.js"></script>
</body>
</html>
