<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 工具</title>
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/app-shell.css">
</head>
<body class="app-body">
<div class="app-shell">
    <aside id="app-sidebar-mount" data-active="agent-tasks" aria-label="主导航"></aside>
    <main class="main-panel">
        <div class="content-container">
            <header class="page-header">
                <h1 class="page-title">Agent 工具</h1>
                <p class="page-subtitle">当前阶段仅支持内置安全工具。AI 任务会按固定流程自动调用「检索知识库」「总结检索结果」，并生成最终报告。</p>
            </header>

            <div id="loading-status" class="status loading hidden" role="status">正在加载可用工具…</div>
            <div id="error-status" class="error-card hidden" role="alert">
                <strong>加载失败</strong>
                <p id="error-message" style="margin:4px 0 0"></p>
            </div>

            <section class="card" aria-labelledby="tools-title">
                <h2 id="tools-title">可用工具</h2>
                <div id="tools-empty" class="empty-state hidden">
                    <p>暂无可用工具。</p>
                </div>
                <div id="tools-list" class="entity-stack"></div>
            </section>

            <details class="technical-details">
                <summary>查看技术详情</summary>
                <p class="muted">API：<code>GET /agent/tools</code></p>
                <pre id="tools-json"></pre>
            </details>
        </div>
    </main>
</div>
<script src="/app-nav.js"></script>
<script>
(function () {
    const loadingStatus = document.getElementById("loading-status");
    const errorStatus = document.getElementById("error-status");
    const errorMessage = document.getElementById("error-message");
    const toolsEmpty = document.getElementById("tools-empty");
    const toolsList = document.getElementById("tools-list");
    const toolsJson = document.getElementById("tools-json");

    loadTools();

    async function loadTools() {
        loadingStatus.classList.remove("hidden");
        errorStatus.classList.add("hidden");
        try {
            const response = await fetch("/agent/tools");
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload && payload.message ? payload.message : "加载失败");
            }
            renderTools(Array.isArray(payload) ? payload : []);
            toolsJson.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
            errorMessage.textContent = error.message || "无法加载工具列表";
            errorStatus.classList.remove("hidden");
        } finally {
            loadingStatus.classList.add("hidden");
        }
    }

    function renderTools(tools) {
        toolsList.innerHTML = "";
        if (tools.length === 0) {
            toolsEmpty.classList.remove("hidden");
            return;
        }
        toolsEmpty.classList.add("hidden");
        tools.forEach(function (tool) {
            const card = document.createElement("div");
            card.className = "entity-card";
            card.innerHTML =
                '<h3 class="entity-card-title">' + escapeHtml(tool.displayName || tool.toolName) + "</h3>" +
                '<p class="entity-card-hint">' + escapeHtml(tool.description || "") + "</p>" +
                '<p class="muted" style="font-size:0.84rem;margin-top:8px">技术名称：' + escapeHtml(tool.toolName) + "</p>";
            toolsList.appendChild(card);
        });
    }

    function escapeHtml(value) {
        if (value === undefined || value === null) {
            return "";
        }
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }
})();
</script>
</body>
</html>
