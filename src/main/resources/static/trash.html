<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾箱 · MindWeaver</title>
    <link rel="stylesheet" href="/mindweaver.css?v=mw-ivory-app-shell-v1">
    <link rel="stylesheet" href="/app-shell.css?v=mw-compat-v1">
</head>
<body class="mw-page" data-page="trash">
<div class="mw-app-shell app-shell">
    <aside id="app-sidebar-mount" data-active="trash" aria-label="主导航"></aside>
    <main class="mw-main-panel main-panel">
        <div class="mw-page-content content-container">
            <header class="mw-page-header page-header">
                <div>
                    <h1 class="mw-page-title page-title">垃圾箱</h1>
                    <p class="mw-page-description page-subtitle">已删除的内容将保留一段时间，您可以随时恢复或永久删除。</p>
                </div>
            </header>

            <div class="mw-segmented" role="tablist" aria-label="筛选类型" style="margin-bottom:16px">
                <span class="mw-segment active">全部</span>
                <span class="mw-segment">文档</span>
            </div>
            <p class="muted" style="font-size:0.84rem;margin:0 0 20px">7 天后将自动永久删除；永久删除后不可恢复。</p>

            <section class="mw-table-card card">
                <div id="trash-empty" class="mw-empty-state empty-state hidden">
                    <div class="empty-state-icon" aria-hidden="true">🗑</div>
                    <h3 class="mw-empty-title">垃圾箱为空</h3>
                    <p class="mw-empty-description">没有需要处理的删除内容。删除的文档会在这里暂存 7 天。</p>
                </div>
                <div id="trash-list" class="entity-stack"></div>
                <details class="technical-details hidden" id="trash-page-tech-hint" aria-hidden="true">
                    <summary>查看技术详情</summary>
                    <p class="muted">文档 ID 等技术字段在列表项折叠区展示。</p>
                </details>
            </section>
        </div>
    </main>
</div>
<script src="/app-nav.js"></script>
<script src="/trash.js"></script>
</body>
</html>
